<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Master Agent - MUD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 顶部状态栏 -->
        <header id="status-bar">
            <span id="game-title">⚔️ Game Master Agent</span>
            <div id="player-stats">
                <span class="stat">❤️ <span id="hp">100/100</span></span>
                <span class="stat">💙 <span id="mp">50/50</span></span>
                <span class="stat">⭐ Lv.<span id="level">1</span></span>
                <span class="stat">💰 <span id="gold">0</span></span>
            </div>
        </header>

        <!-- 主内容区 -->
        <div id="main-content">
            <!-- 叙事区 -->
            <div id="narrative-panel">
                <div id="narrative-content"></div>

                <!-- 战斗面板 -->
                <div id="combat-panel" style="display:none;">
                    <div id="combat-header">⚔️ 战斗</div>
                    <div id="combatants"></div>
                    <div id="combat-log"></div>
                    <div id="combat-actions">
                        <button class="combat-btn" onclick="combatAction('attack')">⚔️ 攻击</button>
                        <button class="combat-btn" onclick="combatAction('defend')">🛡️ 防御</button>
                        <button class="combat-btn" onclick="combatAction('use_item')">🧪 使用物品</button>
                        <button class="combat-btn flee" onclick="combatAction('flee')">🏃 逃跑</button>
                    </div>
                </div>

                <!-- 分支选择面板 -->
                <div id="choice-panel" style="display:none;">
                    <div id="choice-options"></div>
                </div>
            </div>

            <!-- 右侧信息面板 -->
            <div id="info-panel">
                <div class="tabs">
                    <button class="tab active" data-tab="npcs">NPC</button>
                    <button class="tab" data-tab="inventory">背包</button>
                    <button class="tab" data-tab="quests">任务</button>
                </div>
                <div id="tab-content">
                    <div id="tab-npcs" class="tab-pane active">
                        <p class="placeholder">暂无NPC信息</p>
                    </div>
                    <div id="tab-inventory" class="tab-pane">
                        <p class="placeholder">背包为空</p>
                    </div>
                    <div id="tab-quests" class="tab-pane">
                        <p class="placeholder">暂无任务</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 底部输入区 -->
        <div id="input-area">
            <input type="text" id="user-input" placeholder="输入你的行动..." autocomplete="off">
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
        // 如果 USE_MOCK 为 true，使用 MockGameClient
        const USE_MOCK = false;
    </script>
    <script src="js/mock.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
